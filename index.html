<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Agro-Intelligence PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #38bdf8; margin-bottom: 10px; font-size: 1.8rem; }

        /* البطاقات العلوية */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
        .card h3 { color: #38bdf8; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 15px; }
        .value { font-size: 2rem; font-weight: bold; color: #10b981; }
        .unit { color: #94a3b8; font-size: 0.8rem; }

        /* قسم العدادات المركزية */
        .kpi-gauges { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 25px; }
        .gauge-display { 
            background: #1e293b; padding: 25px; border-radius: 15px; border: 1px solid #334155;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .gauge-container { width: 100%; max-width: 250px; height: 160px; position: relative; margin: 0 auto; }
        .gauge-label { font-size: 0.85rem; color: #38bdf8; font-weight: bold; margin-bottom: 15px; text-align: center; }
        .gauge-text { position: absolute; bottom: 15px; width: 100%; text-align: center; font-size: 1.8rem; font-weight: bold; color: white; }

        /* قسم المنحنى المنفصل (KPI Curve) */
        .kpi-curve-section { background: #1e293b; padding: 20px; border-radius: 15px; border: 1px solid #38bdf8; height: 300px; }
        .kpi-curve-section h3 { color: #38bdf8; font-size: 0.8rem; margin-top: 0; margin-bottom: 15px; }

        .pump-btn {
            padding: 12px 30px; border-radius: 50px; border: 2px solid #475569; font-weight: bold;
            display: block; margin: 0 auto 20px auto; background: #334155; color: #94a3b8;
        }
        .pump-on { background: #059669; color: white; border-color: #10b981; box-shadow: 0 0 15px #10b981; }

        @media (max-width: 768px) {
            .grid, .kpi-gauges { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1>Système d'Irrigation Intelligent</h1>
    <button id="pumpIndicator" class="pump-btn">POMPE : ARRÊTÉE</button>

    <div class="grid">
        <div class="card"><h3>Température</h3><div class="value" id="temp">--</div><div class="unit">°C</div></div>
        <div class="card"><h3>Humidité Air</h3><div class="value" id="air_hum">--</div><div class="unit">%</div></div>
        <div class="card"><h3>Humidité Sol</h3><div class="value" style="color:#fbbf24" id="soil_hum">--</div><div class="unit">%</div></div>
        <div class="card"><h3>Pression</h3><div class="value" id="pres">--</div><div class="unit">hPa</div></div>
        <div class="card"><h3>Vitesse Vent</h3><div class="value" id="wind_speed">--</div><div class="unit">m/s</div></div>
        <div class="card"><h3>Lumière</h3><div class="value" id="lux">--</div><div class="unit">Lux</div></div>
    </div>

    <div class="kpi-gauges">
        <div class="gauge-display">
            <div class="gauge-label">💧 BESOIN EN EAU (L/m²)</div>
            <div class="gauge-container">
                <canvas id="gaugeQte"></canvas>
                <div class="gauge-text" id="numQte">0.00</div>
            </div>
        </div>
        <div class="gauge-display">
            <div class="gauge-label">⏱️ DURÉE D'ARROSAGE (MIN)</div>
            <div class="gauge-container">
                <canvas id="gaugeTime"></canvas>
                <div class="gauge-text" id="numTime">0.0</div>
            </div>
        </div>
    </div>

    <div class="kpi-curve-section">
        <h3>📈 ANALYSE DU KPI (STRESS HYDRIQUE)</h3>
        <canvas id="mainKpiCurve"></canvas>
    </div>

    <script>
        const brokerIP = "192.168.167.208"; 
        const client = new Paho.MQTT.Client(brokerIP, 9001, "web_client_" + Math.random());

        const gConfig = (color, max) => ({
            type: 'doughnut',
            data: { datasets: [{ data: [0, max], backgroundColor: [color, '#0f172a'], borderWidth: 0 }]},
            options: { 
                rotation: -90, 
                circumference: 180, 
                cutout: '85%', 
                maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { enabled: false } } 
            }
        });

        const gaugeQte = new Chart(document.getElementById('gaugeQte'), gConfig('#3b82f6', 2.0));
        const gaugeTime = new Chart(document.getElementById('gaugeTime'), gConfig('#10b981', 10.0));

        // إعداد منحنى الـ KPI مع خط الـ Stress Hydrique
        const kpiCurve = new Chart(document.getElementById('mainKpiCurve'), {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#f43f5e', backgroundColor: '#f43f5e22', fill: true, tension: 0.4, borderWidth: 3, pointRadius: 3 }]},
            options: { 
                responsive: true, maintainAspectRatio: false,
                scales: { 
                    x: { display: false },
                    y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }
                },
                plugins: { 
                    legend: { display: false },
                    annotation: {
                        annotations: {
                            stressLine: {
                                type: 'line',
                                yMin: 0.7, // عتبة الإجهاد المائي (يمكنك تغييرها)
                                yMax: 0.7,
                                borderColor: '#ef4444',
                                borderWidth: 2,
                                borderDash: [6, 6],
                                label: {
                                    display: true,
                                    content: 'STRESS HYDRIQUE',
                                    backgroundColor: '#ef4444',
                                    color: 'white',
                                    font: { size: 10, weight: 'bold' },
                                    position: 'end'
                                }
                            }
                        }
                    }
                }
            }
        });

        client.onMessageArrived = (msg) => {
            const topic = msg.destinationName;
            const val = parseFloat(msg.payloadString);

            // Sensors
            if(topic === "sensor/temp")       document.getElementById("temp").innerText = val.toFixed(1);
            if(topic === "sensor/hum_air")    document.getElementById("air_hum").innerText = val.toFixed(1);
            if(topic === "sensor/soil")       document.getElementById("soil_hum").innerText = val.toFixed(0);
            if(topic === "sensor/pression")   document.getElementById("pres").innerText = Math.round(val);
            if(topic === "sensor/vent")       document.getElementById("wind_speed").innerText = val.toFixed(1);
            if(topic === "sensor/lumiere")    document.getElementById("lux").innerText = Math.round(val);

            // Gauges
            if(topic === "dashboard/besoin_eau") {
                document.getElementById("numQte").innerText = val.toFixed(2);
                gaugeQte.data.datasets[0].data = [val, Math.max(0, 2.0 - val)];
                gaugeQte.update();
            }
            if(topic === "dashboard/duree_min") {
                document.getElementById("numTime").innerText = val.toFixed(1);
                gaugeTime.data.datasets[0].data = [val, Math.max(0, 10.0 - val)];
                gaugeTime.update();
            }

            // KPI Curve
            if(topic === "dashboard/kpi_main") {
                kpiCurve.data.labels.push("");
                kpiCurve.data.datasets[0].data.push(val);
                if(kpiCurve.data.labels.length > 20) { kpiCurve.data.labels.shift(); kpiCurve.data.datasets[0].data.shift(); }
                kpiCurve.update();
            }

            if(topic === "pump/status") {
                const btn = document.getElementById("pumpIndicator");
                btn.innerText = (msg.payloadString === "ON") ? "POMPE : EN COURS" : "POMPE : ARRÊTÉE";
                btn.className = (msg.payloadString === "ON") ? "pump-btn pump-on" : "pump-btn";
            }
        };

        client.connect({ onSuccess: () => { 
            client.subscribe("sensor/#"); client.subscribe("dashboard/#"); client.subscribe("pump/#"); 
        }});
    </script>
</body>
</html>
